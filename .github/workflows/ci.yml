name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bcon
          POSTGRES_PASSWORD: bcon_dev
          POSTGRES_DB: bcon_test
        ports:
          - 5432:5432
        # Wait for Postgres to accept connections before the steps run.
        options: >-
          --health-cmd "pg_isready -U bcon -d bcon_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # The app + tests run on Postgres. `prisma migrate deploy` applies the
      # committed migrations to this disposable service DB; tests create
      # their own uniquely-slugged rows (no fixtures required).
      DATABASE_URL: postgresql://bcon:bcon_dev@127.0.0.1:5432/bcon_test?schema=public
      TEST_DATABASE_URL: postgresql://bcon:bcon_dev@127.0.0.1:5432/bcon_test?schema=public
      # Disable outbound LLM calls in CI (tests should be hermetic).
      ENABLE_LLM_CALLS: "false"
      # NextAuth + vault secrets. `next build` evaluates modules with
      # NODE_ENV=production, which trips src/lib/env-guard.ts — so these
      # must be strong, non-placeholder values (the guard rejects empty,
      # too-short, or the known dev/CI placeholder strings). Still fake
      # (CI only), just not weak.
      NEXTAUTH_SECRET: ci-strong-nextauth-secret-0123456789abcdef0123456789abcdef
      AUTH_SECRET: ci-strong-auth-secret-0123456789abcdef0123456789abcdef
      BCON_VAULT_KEY: ci-strong-vault-key-0123456789abcdef0123456789abcdef
      # Delivery transports: env-guard refuses to boot in production with a
      # no-op email/notify transport (a "log" email transport silently drops
      # password resets/invites; a "console" notify transport never reaches a
      # human). The production `next build` evaluates env-guard, so configure
      # real transport names here. No provider creds are present, so nothing is
      # actually sent during CI — only the transport selection is exercised.
      EMAIL_TRANSPORT: resend
      NOTIFY_TRANSPORT: email
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations (Postgres)
        run: npx prisma migrate deploy

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vitest
        run: npx vitest run

      - name: Next build
        # Full production build — catches route/type/RSC errors that tsc
        # and vitest miss (e.g. a server/client boundary violation or a
        # bad dynamic import). NODE_ENV is forced to production by `next
        # build`, which also exercises src/lib/env-guard.ts against the
        # strong CI secrets above.
        run: npx next build

      - name: Seed portal catalog (smoke check)
        run: npx tsx prisma/seed-portals.ts

      - name: Dependency security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Generate SBOM (CycloneDX)
        run: |
          npx --yes @cyclonedx/cyclonedx-npm --output-file sbom.cdx.json || echo "SBOM generation skipped"
        continue-on-error: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          if-no-files-found: ignore
